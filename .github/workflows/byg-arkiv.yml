name: Byg historisk arkiv (engangskørsel)

on:
  workflow_dispatch:

jobs:
  byg-arkiv:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Hent repository
        uses: actions/checkout@v4

      - name: Installer lftp
        run: sudo apt-get install -y lftp

      - name: Kør arkivscript
        env:
          FTP_HOST: front01.poweredbyintegra.dk
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: python3 scripts/byg-arkiv.py

      - name: Commit og push arkiv
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Historisk arkiv bygget $(date +'%Y-%m-%d')"
          git push
