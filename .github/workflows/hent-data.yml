name: Hent biografdata fra FTP

on:
  schedule:
    - cron: '0 4 * * *'  # Kører hver dag kl. 04:00 UTC (06:00 dansk tid)
  workflow_dispatch:

jobs:
  hent-og-gem:
    runs-on: ubuntu-latest

    steps:
      - name: Hent repository
        uses: actions/checkout@v4

      - name: Installer lftp
        run: sudo apt-get install -y lftp

      - name: Hent dagens XML-fil fra FTP
        env:
          FTP_HOST: front01.poweredbyintegra.dk
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          DATO=$(date +'%Y%m%d')
          FILNAVN="${DATO}_179_roedovre.xml"
          mkdir -p ny-fil
          lftp -u "$FTP_USER","$FTP_PASS" "$FTP_HOST" << EOF
          set ssl:verify-certificate no
          get -O ./ny-fil/ $FILNAVN
          bye
          EOF

      - name: Konverter XML til JSON
        run: python3 scripts/konverter.py

      - name: Commit og push opdateret data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/data.json
          git diff --staged --quiet || git commit -m "Opdateret biografdata $(date +'%Y-%m-%d')"
          git push
